<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMHB — Hors ligne</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#F5C800;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.logo{background:#F5C800;color:#0a0a0a;font-weight:900;font-size:24px;padding:8px 18px;border-radius:6px;letter-spacing:2px;margin-bottom:32px}
.icon{font-size:56px;margin-bottom:16px;opacity:.4}
h1{font-size:20px;font-weight:800;margin-bottom:8px}
p{font-size:14px;color:#888;line-height:1.6;max-width:280px}
button{margin-top:24px;padding:12px 28px;background:#F5C800;color:#0a0a0a;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
  <div class="logo">SMHB</div>
  <div class="icon">📡</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion internet pour accéder au calendrier et aux séances en temps réel.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
