<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#F5C800">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SMHB">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SMHB Handball</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

</head>
<body>

<!-- ═══ ÉCRAN DE CONNEXION ════════════════════════════════════════ -->
<div id="authScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#0a0a0a">
  <div style="text-align:center;margin-bottom:32px">
    <div style="background:#F5C800;color:#0a0a0a;font-weight:900;font-size:28px;padding:10px 20px;border-radius:8px;letter-spacing:2px;display:inline-block">SMHB</div>
    <div style="color:#888;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:8px">Handball Club</div>
  </div>

  <div style="width:100%;max-width:380px;background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:24px">
    <!-- Tabs login/signup -->
    <div style="display:flex;background:#0a0a0a;border-radius:8px;padding:4px;margin-bottom:20px">
      <button onclick="showAuthTab('login')" id="tab-login" style="flex:1;padding:8px;border-radius:6px;background:#F5C800;color:#0a0a0a;font-weight:700;font-size:13px;border:none;cursor:pointer">Connexion</button>
      <button onclick="showAuthTab('signup')" id="tab-signup" style="flex:1;padding:8px;border-radius:6px;background:none;color:#888;font-weight:700;font-size:13px;border:none;cursor:pointer">Inscription</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="loginEmail" placeholder="coach@smhb.fr"></div>
      <div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" id="loginPassword" placeholder="••••••••"></div>
      <button onclick="doLogin()" class="btn-full">Se connecter</button>
      <p style="text-align:center;margin-top:12px;font-size:12px;color:#888"><a href="#" onclick="forgotPassword()" style="color:#F5C800">Mot de passe oublié ?</a></p>
    </div>

    <!-- Signup -->
    <div id="signupForm" style="display:none">
      <div class="fg"><label class="fl">Nom complet</label><input class="fi" id="signupName" placeholder="Marie Durand"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="signupEmail" placeholder="marie@email.com"></div>
      <div class="fg"><label class="fl">Mot de passe</label><input class="fi" type="password" id="signupPassword" placeholder="Min. 8 caractères"></div>
      <div class="fg">
        <label class="fl">Je suis</label>
        <select class="fi" id="signupRole" onchange="toggleCategoryField()">
          <option value="player">Joueur / Joueuse</option>
          <option value="parent">Parent</option>
        </select>
      </div>
      <div class="fg" id="categoryField">
        <label class="fl">Catégorie</label>
        <select class="fi" id="signupCategory">
          <option value="">Chargement...</option>
        </select>
      </div>
      <button onclick="doSignUp()" class="btn-full">Créer mon compte</button>
    </div>

    <div id="authError" style="display:none;margin-top:12px;padding:10px;background:#1a0a0a;border:1px solid #7f1d1d;border-radius:8px;color:#f87171;font-size:13px;text-align:center"></div>
  </div>
</div>

<!-- ═══ APPLICATION PRINCIPALE ════════════════════════════════════ -->
<div id="appScreen" style="display:none;background:#0a0a0a;min-height:100vh">

  <!-- TOPBAR -->
  <div style="background:#0a0a0a;border-bottom:2px solid #F5C800;padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="background:#F5C800;color:#0a0a0a;font-weight:900;font-size:15px;padding:4px 10px;border-radius:4px;letter-spacing:1px">SMHB</span>
      <!-- Sélecteur de catégorie -->
      <select id="categoryFilter" onchange="onCategoryChange()" style="background:#161616;border:1px solid #2a2a2a;border-radius:6px;color:#F5C800;font-size:12px;font-weight:700;padding:4px 8px;cursor:pointer">
        <option value="">Toutes catégories</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <!-- Badge notifications -->
      <button onclick="go('notifs')" style="position:relative;background:none;border:none;color:#F5C800;cursor:pointer;padding:6px">
        <i class="ti ti-bell" style="font-size:22px"></i>
        <span id="notifBadge" style="display:none;position:absolute;top:2px;right:2px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;align-items:center;justify-content:center"></span>
      </button>
      <button onclick="doLogout()" style="background:none;border:1px solid #2a2a2a;color:#888;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer"><i class="ti ti-logout" style="font-size:14px"></i></button>
    </div>
  </div>

  <!-- NAV ONGLETS -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#0a0a0a;padding:10px 10px 0;border-bottom:2px solid #F5C800">
    <button onclick="go('calendar')" id="nav-calendar" class="nav-btn active-nav"><i class="ti ti-calendar" style="font-size:24px"></i>Calendrier</button>
    <button onclick="go('events')" id="nav-events" class="nav-btn inactive-nav"><i class="ti ti-list" style="font-size:24px"></i>Séances</button>
    <button onclick="go('players')" id="nav-players" class="nav-btn inactive-nav"><i class="ti ti-users" style="font-size:24px"></i>Équipe</button>
    <button onclick="go('admin')" id="nav-admin" class="nav-btn inactive-nav" style="display:none"><i class="ti ti-settings" style="font-size:24px"></i>Admin</button>
    <button onclick="go('profile')" id="nav-profile" class="nav-btn inactive-nav"><i class="ti ti-user" style="font-size:24px"></i>Profil</button>
  </div>

  <!-- ─── VUE CALENDRIER ─────────────────────────────────────── -->
  <div class="view active" id="view-calendar">
    <div class="cal-nav-row">
      <button onclick="prevM()" class="cal-btn"><i class="ti ti-chevron-left"></i></button>
      <div id="mLabel" style="font-size:17px;font-weight:800;color:#F5C800"></div>
      <button onclick="nextM()" class="cal-btn"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px"></div>
    <div style="display:flex;gap:16px;margin-top:10px;padding:10px 14px;background:#161616;border-radius:8px;border:1px solid #2a2a2a">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888"><div style="width:6px;height:6px;border-radius:50%;background:#F5C800"></div>Match</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888"><div style="width:6px;height:6px;border-radius:50%;background:#444"></div>Entraînement</div>
    </div>
    <div id="dayDetail" style="margin-top:14px"></div>
  </div>

  <!-- ─── VUE SÉANCES ────────────────────────────────────────── -->
  <div class="view" id="view-events">
    <div id="statsRow" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px"></div>
    <div id="eventsList"></div>
  </div>

  <!-- ─── VUE ÉQUIPE ─────────────────────────────────────────── -->
  <div class="view" id="view-players">
    <!-- Filtre par catégorie local à la vue -->
    <div id="categoryTabs" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none"></div>
    <div id="playerList"></div>
  </div>

  <!-- ─── VUE ADMIN (coaches seulement) ─────────────────────── -->
  <div class="view" id="view-admin">
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:14px">
      <div class="section-label"><i class="ti ti-circle-plus"></i>Nouvelle séance</div>
      <div class="fg"><label class="fl">Type</label>
        <select class="fi" id="nType" onchange="toggleExtras()">
          <option value="match">Match</option>
          <option value="training">Entraînement</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Titre / Adversaire</label><input class="fi" id="nTitle" placeholder="ex : Match vs Libourne HB"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="nDate"></div>
        <div class="fg"><label class="fl">Heure</label><input class="fi" type="time" id="nTime"></div>
      </div>
      <div class="fg"><label class="fl">Catégorie</label>
        <select class="fi" id="nCategory"><option value="">Toutes</option></select>
      </div>
      <div id="matchExtras">
        <div class="fg"><label class="fl">Lieu</label><input class="fi" id="nLoc" placeholder="Gymnase Jean-Moulin"></div>
        <div class="fg"><label class="fl">Domicile / Extérieur</label>
          <select class="fi" id="nHA"><option value="home">Domicile</option><option value="away">Extérieur</option></select>
        </div>
      </div>
      <button onclick="addEvent()" class="btn-full">+ Ajouter au calendrier</button>
    </div>
    <div class="section-label"><i class="ti ti-list"></i>Toutes les séances</div>
    <div id="adminList"></div>
  </div>

  <!-- ─── VUE PROFIL ─────────────────────────────────────────── -->
  <div class="view" id="view-profile">
    <div id="profileContent"></div>
  </div>

  <!-- ─── VUE NOTIFICATIONS ──────────────────────────────────── -->
  <div class="view" id="view-notifs">
    <div class="section-label"><i class="ti ti-bell"></i>Notifications</div>
    <div id="notifList"></div>
  </div>

</div><!-- /appScreen -->

<!-- MODAL INSCRIPTION -->
<div id="modal" onclick="bgClose(event)" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-end;justify-content:center">
  <div style="background:#161616;border:1px solid #F5C800;border-bottom:none;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:20px;max-height:88vh;overflow-y:auto">
    <div style="width:44px;height:4px;background:#333;border-radius:2px;margin:0 auto 16px"></div>
    <div id="moTitle" style="font-size:16px;font-weight:800;color:#F5C800;margin-bottom:14px"></div>
    <div id="moBody"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="closeModal()" style="flex:1;padding:13px;border-radius:9px;background:transparent;border:1.5px solid #F5C800;color:#F5C800;font-size:14px;font-weight:800;cursor:pointer">Annuler</button>
      <button onclick="confirmReg()" style="flex:2;padding:13px;border-radius:9px;background:#F5C800;color:#0a0a0a;border:none;font-size:14px;font-weight:800;cursor:pointer">Confirmer</button>
    </div>
  </div>
</div>

<div id="toast" style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#F5C800;color:#0a0a0a;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap"></div>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#F5C800}
button{cursor:pointer;font-family:inherit}
.nav-btn{padding:13px 6px 11px;font-size:10px;font-weight:800;letter-spacing:.8px;display:flex;flex-direction:column;align-items:center;gap:6px;border-radius:10px 10px 0 0;text-transform:uppercase;border:none}
.active-nav{background:#F5C800;color:#0a0a0a;border:2px solid #F5C800;border-bottom:none}
.inactive-nav{background:#0a0a0a;color:#F5C800;border:2px solid #F5C800;border-bottom:none;opacity:.55}
.inactive-nav:hover{opacity:.85}

.view.active{display:block}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:#F5C800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
.fi{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#F5C800;font-size:14px;font-family:inherit}
.fi:focus{outline:none;border-color:#F5C800}
.fi::placeholder{color:#3a3a3a}
select.fi option{background:#161616;color:#F5C800}
.btn-full{width:100%;background:#F5C800;color:#0a0a0a;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:800}
.btn-full:hover{background:#C9A200}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#F5C800;width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// createClient chargé via CDN UMD ci-dessous

// Fonctions notifications inline
function registerServiceWorker(){}
function enablePushForUser(){}
function updateNotifBadge(n){ const b=document.getElementById('notifBadge'); if(b){b.textContent=n>9?'9+':n; b.style.display=n>0?'flex':'none';} }
function showLocalNotif(t,b){ const el=document.createElement('div'); el.style.cssText='position:fixed;top:70px;right:12px;background:#1e1e1e;border:1px solid #F5C800;border-radius:10px;padding:12px 16px;max-width:300px;z-index:500;font-family:sans-serif'; el.innerHTML='<div style="font-size:13px;font-weight:700;color:#F5C800;margin-bottom:4px">'+t+'</div><div style="font-size:12px;color:#aaa">'+b+'</div>'; document.body.appendChild(el); setTimeout(()=>el.remove(),5000); }
function scheduleReminders(){}


// ── CONFIG — remplacez par vos vraies valeurs ──────────────────
const SUPABASE_URL = 'https://VOTRE_PROJECT_ID.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdndmx3cHNpYWlmcHlza2R6ZHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTQzMTMsImV4cCI6MjA5NzA5MDMxM30.Y8vsQWZGHU4QO74_2D8riy-J0pVWm3D6CyJTtcv07kc';
// ──────────────────────────────────────────────────────────────

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentProfile = null;
let allEvents = [];
let allCategories = [];
let myRegistrations = [];
let selectedEventId = null;
let selectedCategory = null;
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();
const todayStr = new Date().toISOString().split('T')[0];
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const FMT = ds => new Date(ds+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

// ═══ INIT ══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  await registerServiceWorker();
  const { data: { session } } = await db.auth.getSession();
  if (session) await initApp(session.user);
  db.auth.onAuthStateChange(async (_e, session) => {
    if (session) await initApp(session.user);
    else showAuth();
  });
});

async function initApp(user) {
  currentUser = user;
  const { data: profile } = await db.from('profiles').select('*, categories(name,color)').eq('id', user.id).single();
  currentProfile = profile;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  // Affiche/cache onglet Admin
  if (profile.role === 'coach') {
    document.getElementById('nav-admin').style.display = 'flex';
  }

  await loadCategories();
  await loadEvents();
  await loadNotifications();
  subscribeRealtime();
  drawCalendar();
  drawEvents();
}

function showAuth() {
  currentUser = null; currentProfile = null;
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}

// ═══ AUTH ══════════════════════════════════════════════════════
window.showAuthTab = (tab) => {
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
  document.getElementById('tab-login').style.cssText = tab==='login'?'flex:1;padding:8px;border-radius:6px;background:#F5C800;color:#0a0a0a;font-weight:700;font-size:13px;border:none;cursor:pointer':'flex:1;padding:8px;border-radius:6px;background:none;color:#888;font-weight:700;font-size:13px;border:none;cursor:pointer';
  document.getElementById('tab-signup').style.cssText = tab==='signup'?'flex:1;padding:8px;border-radius:6px;background:#F5C800;color:#0a0a0a;font-weight:700;font-size:13px;border:none;cursor:pointer':'flex:1;padding:8px;border-radius:6px;background:none;color:#888;font-weight:700;font-size:13px;border:none;cursor:pointer';
  document.getElementById('authError').style.display = 'none';
};

window.doLogin = async () => {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) showAuthError(error.message);
};

window.doSignUp = async () => {
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const role = document.getElementById('signupRole').value;
  const categoryId = document.getElementById('signupCategory').value || null;
  const { error } = await db.auth.signUp({
    email, password,
    options: { data: { full_name: name, role, category_id: categoryId } }
  });
  if (error) showAuthError(error.message);
  else showAuthError('Vérifiez votre email pour confirmer votre compte.', '#22c55e');
};

window.doLogout = async () => { await db.auth.signOut(); };
window.forgotPassword = async () => {
  const email = prompt('Votre adresse email :');
  if (email) { await db.auth.resetPasswordForEmail(email); toast('Email de réinitialisation envoyé'); }
};
window.toggleCategoryField = () => {
  document.getElementById('categoryField').style.display = document.getElementById('signupRole').value === 'player' ? 'block' : 'none';
};

function showAuthError(msg, color = '#f87171') {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.color = color; el.style.display = 'block';
}

// ═══ DONNÉES ═══════════════════════════════════════════════════
async function loadCategories() {
  const { data } = await db.from('categories').select('*').order('min_age', { ascending: false, nullsFirst: true });
  allCategories = data || [];

  // Sélecteur topbar
  const sel = document.getElementById('categoryFilter');
  sel.innerHTML = '<option value="">Toutes catégories</option>' +
    allCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  // Sélecteur admin
  const nCat = document.getElementById('nCategory');
  if (nCat) nCat.innerHTML = '<option value="">Toutes</option>' +
    allCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  // Sélecteur inscription
  const signupCat = document.getElementById('signupCategory');
  if (signupCat) signupCat.innerHTML = allCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  // Onglets catégories vue Équipe
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = `<button onclick="filterPlayerCat('')" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #F5C800;background:#F5C800;color:#0a0a0a;cursor:pointer;white-space:nowrap">Tous</button>` +
    allCategories.map(c => `<button onclick="filterPlayerCat('${c.id}')" style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid ${c.color};color:${c.color};background:transparent;cursor:pointer;white-space:nowrap">${c.name}</button>`).join('');
}

async function loadEvents() {
  let q = db.from('events').select('*, categories(name,color), registrations(player_id, profiles(full_name))').order('date').order('time');
  if (selectedCategory) q = q.eq('category_id', selectedCategory);
  const { data } = await q;
  allEvents = data || [];
  const { data: regs } = await db.from('registrations').select('event_id').eq('player_id', currentUser.id);
  myRegistrations = regs?.map(r => r.event_id) || [];
  scheduleReminders(allEvents);
}

async function loadNotifications() {
  const { data } = await db.from('notifications').select('*').eq('user_id', currentUser.id).eq('read', false).order('sent_at', { ascending: false });
  updateNotifBadge((data || []).length);
  const list = document.getElementById('notifList');
  if (!data?.length) { list.innerHTML = '<div style="text-align:center;padding:32px;color:#888;font-size:13px">Aucune notification</div>'; return; }
  list.innerHTML = data.map(n => `
    <div onclick="markRead('${n.id}', this)" class="card" style="cursor:pointer">
      <div style="font-weight:700;font-size:14px;color:#F5C800">${n.title}</div>
      <div style="font-size:12px;color:#888;margin-top:4px">${n.body}</div>
      <div style="font-size:11px;color:#555;margin-top:6px">${new Date(n.sent_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
    </div>`).join('');
}

window.markRead = async (id, el) => {
  await db.from('notifications').update({ read: true }).eq('id', id);
  el.style.opacity = '.5';
  const { data } = await db.from('notifications').select('id').eq('user_id', currentUser.id).eq('read', false);
  updateNotifBadge((data || []).length);
};

// Temps réel
function subscribeRealtime() {
  db.channel('events-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, async (payload) => {
      await loadEvents();
      drawCalendar(); drawEvents();
      if (payload.eventType === 'INSERT') showLocalNotif('Nouvelle séance ajoutée', payload.new.title);
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${currentUser.id}` }, async (payload) => {
      showLocalNotif(payload.new.title, payload.new.body);
      const { data } = await db.from('notifications').select('id').eq('user_id', currentUser.id).eq('read', false);
      updateNotifBadge((data || []).length);
    })
    .subscribe();
}

// ═══ NAVIGATION ════════════════════════════════════════════════
window.go = (v) => {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x => { x.className = 'nav-btn inactive-nav'; });
  document.getElementById('view-'+v).classList.add('active');
  const nb = document.getElementById('nav-'+v);
  if (nb) nb.className = 'nav-btn active-nav';
  if (v==='events') drawEvents();
  if (v==='players') drawPlayers();
  if (v==='admin') drawAdmin();
  if (v==='profile') drawProfile();
  if (v==='notifs') loadNotifications();
  if (v==='calendar') drawCalendar();
};

window.onCategoryChange = async () => {
  selectedCategory = document.getElementById('categoryFilter').value || null;
  await loadEvents();
  drawCalendar(); drawEvents();
};

window.filterPlayerCat = async (catId) => {
  selectedCategory = catId || null;
  document.querySelectorAll('#categoryTabs button').forEach(b => {
    b.style.background = 'transparent'; b.style.color = b.dataset.color || '#F5C800';
  });
  await drawPlayers(catId);
};

// ═══ CALENDRIER ════════════════════════════════════════════════
function drawCalendar() {
  document.getElementById('mLabel').textContent = MONTHS[calMonth] + ' ' + calYear;
  const g = document.getElementById('calGrid');
  g.innerHTML = ['Lu','Ma','Me','Je','Ve','Sa','Di'].map(d => `<div style="text-align:center;font-size:9px;font-weight:800;color:#888;padding:6px 2px;text-transform:uppercase">${d}</div>`).join('');
  let sd = new Date(calYear, calMonth, 1).getDay() - 1; if (sd < 0) sd = 6;
  const dim = new Date(calYear, calMonth+1, 0).getDate();
  for (let i = 0; i < sd; i++) g.innerHTML += '<div></div>';
  for (let d = 1; d <= dim; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const de = allEvents.filter(e => e.date === ds);
    const isT = ds === todayStr, hm = de.some(e => e.type==='match'), ht = de.some(e => e.type==='training');
    const numStyle = isT ? 'background:#F5C800;color:#0a0a0a;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px' : 'font-size:12px;color:#F5C800;font-weight:600';
    g.innerHTML += `<div onclick="dayClick('${ds}')" style="min-height:40px;border-radius:6px;background:#161616;border:1px solid #1e1e1e;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:3px 2px;gap:2px">
      <div style="${numStyle}">${d}</div>
      ${(hm||ht)?`<div style="display:flex;gap:2px">${hm?'<div style="width:5px;height:5px;border-radius:50%;background:#F5C800"></div>':''}${ht?'<div style="width:5px;height:5px;border-radius:50%;background:#444"></div>':''}</div>`:''}
    </div>`;
  }
  document.getElementById('dayDetail').innerHTML = '';
}

window.dayClick = (ds) => {
  const de = allEvents.filter(e => e.date === ds);
  const det = document.getElementById('dayDetail');
  if (!de.length) { det.innerHTML = '<div style="text-align:center;padding:16px;font-size:13px;color:#888">Aucune séance ce jour</div>'; return; }
  det.innerHTML = `<div class="section-label"><i class="ti ti-calendar-day"></i>${FMT(ds)}</div>` + de.map(eventCard).join('');
};
window.prevM = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } drawCalendar(); };
window.nextM = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } drawCalendar(); };

// ═══ CARTES ÉVÉNEMENT ══════════════════════════════════════════
function eventCard(e) {
  const isM = e.type === 'match';
  const joined = myRegistrations.includes(e.id);
  const regCount = e.registrations?.length || 0;
  const catBadge = e.categories ? `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:${e.categories.color}22;color:${e.categories.color};border:1px solid ${e.categories.color}66">${e.categories.name}</span>` : '';
  const haTag = e.home_away === 'home' ? `<span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:#1e1900;color:#F5C800;border:1px solid #C9A200">Domicile</span>`
    : e.home_away === 'away' ? `<span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;background:#1a0a0a;color:#f87171;border:1px solid #7f1d1d">Extérieur</span>` : '';
  const btn = currentProfile?.role === 'coach' ? ''
    : `<button onclick="openModal('${e.id}')" style="padding:7px 14px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;${joined?'background:transparent;border:1.5px solid #22c55e;color:#22c55e':'background:transparent;border:1.5px solid #F5C800;color:#F5C800'}">${joined?'✓ Inscrit':'S\'inscrire'}</button>`;
  return `<div class="card ${isM?'match':'training'}">
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">
      <span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;${isM?'background:#F5C800;color:#0a0a0a':'background:#2a2a2a;color:#888;border:1px solid #333'}">${isM?'MATCH':'ENTRAÎN.'}</span>
      ${haTag}${catBadge}
    </div>
    <div style="font-weight:700;font-size:15px;color:#F5C800">${e.title}</div>
    <div style="font-size:12px;color:#888;margin-top:5px;display:flex;align-items:center;gap:5px"><i class="ti ti-clock" style="font-size:13px"></i>${FMT(e.date)} · ${e.time}</div>
    ${e.location?`<div style="font-size:12px;color:#888;margin-top:3px;display:flex;align-items:center;gap:5px"><i class="ti ti-map-pin" style="font-size:13px"></i>${e.location}</div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid #2a2a2a">
      <div style="font-size:12px;color:#888;display:flex;align-items:center;gap:5px"><i class="ti ti-users" style="font-size:14px;color:#F5C800"></i>${regCount} inscrits</div>
      ${btn}
    </div>
  </div>`;
}

// ═══ VUE SÉANCES ═══════════════════════════════════════════════
function drawEvents() {
  const upcoming = allEvents.filter(e => e.date >= todayStr);
  const matches = upcoming.filter(e => e.type === 'match');
  const trainings = upcoming.filter(e => e.type === 'training');
  document.getElementById('statsRow').innerHTML = `
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:14px 10px;text-align:center"><div style="font-size:28px;font-weight:900;color:#F5C800">${allEvents.filter(e=>e.type==='match').length}</div><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px">Matchs</div></div>
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:14px 10px;text-align:center"><div style="font-size:28px;font-weight:900;color:#F5C800">${allEvents.filter(e=>e.type==='training').length}</div><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px">Entraîn.</div></div>
    <div style="background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:14px 10px;text-align:center"><div style="font-size:28px;font-weight:900;color:#F5C800">${myRegistrations.length}</div><div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:4px">Mes inscrip.</div></div>`;
  const sh = (icon, txt) => `<div class="section-label"><i class="ti ${icon}"></i>${txt}</div>`;
  document.getElementById('eventsList').innerHTML =
    sh('ti-trophy', 'Matchs à venir') + (matches.length ? matches.map(eventCard).join('') : '<div style="text-align:center;padding:24px;color:#888;font-size:13px">Aucun match à venir</div>') +
    sh('ti-run', 'Entraînements à venir') + (trainings.length ? trainings.map(eventCard).join('') : '<div style="text-align:center;padding:24px;color:#888;font-size:13px">Aucun entraînement à venir</div>');
}

// ═══ VUE ÉQUIPE ════════════════════════════════════════════════
async function drawPlayers(catId = '') {
  let q = db.from('profiles').select('*, categories(name,color)').in('role', ['player']).order('full_name');
  if (catId) q = q.eq('category_id', catId);
  const { data: players } = await q;
  const isCoach = currentProfile?.role === 'coach';
  document.getElementById('playerList').innerHTML = (players || []).map(p => {
    const catBadge = p.categories ? `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:${p.categories.color}22;color:${p.categories.color};border:1px solid ${p.categories.color}66">${p.categories.name}</span>` : '';
    const ini = p.full_name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    return `<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;background:#161616;border:1px solid #2a2a2a;border-radius:9px;margin-bottom:6px">
      <div style="width:38px;height:38px;border-radius:50%;background:#1e1900;border:2px solid #F5C800;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#F5C800;flex-shrink:0">${ini}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#F5C800">${p.full_name} ${catBadge}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${p.phone || ''}</div>
      </div>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:32px;color:#888;font-size:13px">Aucun joueur dans cette catégorie</div>';
}
window.drawPlayers = drawPlayers;

// ═══ VUE ADMIN ═════════════════════════════════════════════════
async function drawAdmin() {
  let q = db.from('events').select('*, categories(name,color), registrations(id)').order('date').order('time');
  const { data: evs } = await q;
  document.getElementById('adminList').innerHTML = (evs || []).map(e => {
    const isM = e.type === 'match';
    return `<div class="card ${isM?'match':'training'}" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <span style="font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;${isM?'background:#F5C800;color:#0a0a0a':'background:#2a2a2a;color:#888;border:1px solid #333'}">${isM?'MATCH':'ENTRAÎN.'}</span>
        ${e.categories?`<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;background:${e.categories.color}22;color:${e.categories.color};border:1px solid ${e.categories.color}66;margin-left:4px">${e.categories.name}</span>`:''}
        <div style="font-size:14px;font-weight:700;color:#F5C800;margin-top:6px">${e.title}</div>
        <div style="font-size:12px;color:#888;margin-top:3px">${FMT(e.date)} · ${e.time} · ${e.registrations?.length||0} inscrits</div>
      </div>
      <button onclick="deleteEvent('${e.id}')" style="background:transparent;border:1px solid #333;color:#888;padding:6px 10px;border-radius:6px;font-size:12px"><i class="ti ti-trash"></i></button>
    </div>`;
  }).join('');
}

window.toggleExtras = () => {
  document.getElementById('matchExtras').style.display = document.getElementById('nType').value === 'match' ? 'block' : 'none';
};

window.addEvent = async () => {
  const type = document.getElementById('nType').value;
  const title = document.getElementById('nTitle').value.trim();
  const date = document.getElementById('nDate').value;
  const time = document.getElementById('nTime').value;
  const loc = document.getElementById('nLoc')?.value.trim();
  const ha = type === 'match' ? document.getElementById('nHA').value : null;
  const catId = document.getElementById('nCategory').value || null;
  if (!title || !date || !time) { toast('Remplissez tous les champs'); return; }
  const { error } = await db.from('events').insert({ type, title, date, time, location: loc || null, home_away: ha, category_id: catId, created_by: currentUser.id });
  if (error) { toast('Erreur : ' + error.message); return; }
  document.getElementById('nTitle').value = ''; document.getElementById('nDate').value = ''; document.getElementById('nTime').value = '';
  toast('Séance ajoutée ✓');
  await loadEvents(); drawAdmin(); drawCalendar();
};

window.deleteEvent = async (id) => {
  if (!confirm('Supprimer cette séance ?')) return;
  await db.from('events').delete().eq('id', id);
  toast('Séance supprimée'); await loadEvents(); drawAdmin(); drawCalendar();
};

// ═══ INSCRIPTIONS ══════════════════════════════════════════════
window.openModal = async (eventId) => {
  selectedEventId = eventId;
  const e = allEvents.find(x => x.id === eventId);
  const joined = myRegistrations.includes(eventId);
  if (joined) {
    await db.from('registrations').delete().eq('event_id', eventId).eq('player_id', currentUser.id);
    myRegistrations = myRegistrations.filter(id => id !== eventId);
    toast('Désinscription effectuée'); drawEvents(); return;
  }
  document.getElementById('moTitle').innerHTML = `<i class="ti ti-calendar-check" style="color:#F5C800"></i> ${e.title}`;
  let childrenHtml = '';
  if (currentProfile?.role === 'parent') {
    const { data: children } = await db.from('parent_children').select('child_id, profiles!parent_children_child_id_fkey(id, full_name)').eq('parent_id', currentUser.id);
    if (children?.length) {
      childrenHtml = `<div class="fg"><label class="fl">Inscrire mon enfant</label><select class="fi" id="childSel">${children.map(c=>`<option value="${c.profiles.id}">${c.profiles.full_name}</option>`).join('')}</select></div>`;
    }
  }
  document.getElementById('moBody').innerHTML = `
    <div style="font-size:12px;color:#888;margin-bottom:8px"><i class="ti ti-clock"></i> ${FMT(e.date)} à ${e.time}</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px"><i class="ti ti-map-pin"></i> ${e.location || 'Lieu à confirmer'}</div>
    ${childrenHtml || `<div style="padding:10px;background:#1e1e1e;border-radius:8px;border:1px solid #2a2a2a;font-size:14px;color:#ccc">Inscription en tant que <strong style="color:#F5C800">${currentProfile?.full_name}</strong></div>`}
    <div style="margin-top:12px;font-size:12px;color:#888">En confirmant, vous validez votre disponibilité.</div>`;
  document.getElementById('modal').style.display = 'flex';
};

window.confirmReg = async () => {
  const e = allEvents.find(x => x.id === selectedEventId);
  let playerId = currentUser.id;
  const childSel = document.getElementById('childSel');
  if (childSel) playerId = childSel.value;
  const { error } = await db.from('registrations').insert({ event_id: selectedEventId, player_id: playerId, registered_by: playerId !== currentUser.id ? currentUser.id : null });
  if (!error) {
    myRegistrations.push(selectedEventId);
    toast('Inscription confirmée ✓');
    closeModal(); await loadEvents(); drawEvents();
  } else toast('Erreur : ' + error.message);
};

window.closeModal = () => { document.getElementById('modal').style.display = 'none'; };
window.bgClose = (ev) => { if (ev.target === document.getElementById('modal')) closeModal(); };

// ═══ PROFIL ════════════════════════════════════════════════════
async function drawProfile() {
  const p = currentProfile;
  const ini = p.full_name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
  document.getElementById('profileContent').innerHTML = `
    <div style="text-align:center;padding:20px 0 24px">
      <div style="width:72px;height:72px;border-radius:50%;background:#1e1900;border:3px solid #F5C800;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#F5C800;margin:0 auto 12px">${ini}</div>
      <div style="font-size:20px;font-weight:800;color:#F5C800">${p.full_name}</div>
      <div style="font-size:13px;color:#888;margin-top:4px">${p.role === 'coach' ? '🏅 Coach' : p.role === 'parent' ? '👨‍👧 Parent' : '🤾 Joueur'} ${p.categories?'· '+p.categories.name:''}</div>
    </div>
    <div class="card">
      <div class="section-label"><i class="ti ti-bell"></i>Notifications</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;color:#F5C800">Notifications push</div>
        <button onclick="togglePush()" id="pushBtn" style="padding:7px 16px;border-radius:7px;font-size:13px;font-weight:700;border:1.5px solid #F5C800;color:#F5C800;background:transparent;cursor:pointer">Activer</button>
      </div>
    </div>
    <div class="card" style="margin-top:10px">
      <div class="section-label"><i class="ti ti-calendar-check"></i>Mes inscriptions</div>
      <div style="font-size:24px;font-weight:900;color:#F5C800;text-align:center;padding:10px 0">${myRegistrations.length}</div>
      <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;text-align:center">séances confirmées</div>
    </div>
    <button onclick="doLogout()" style="width:100%;margin-top:14px;padding:13px;border-radius:8px;background:transparent;border:1.5px solid #ef4444;color:#ef4444;font-size:14px;font-weight:800;cursor:pointer"><i class="ti ti-logout"></i> Se déconnecter</button>`;
}

window.togglePush = async () => {
  const { updateProfile } = await import('/src/db.js');
  const { enablePushForUser } = await import('/src/notifications.js');
  const ok = await enablePushForUser(currentUser.id, updateProfile);
  toast(ok ? 'Notifications activées ✓' : 'Autorisation refusée');
};

// ═══ TOAST ═════════════════════════════════════════════════════
window.toast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(10px)'; }, 2500);
};
</script>

<script>
// Fix: bind auth tabs depuis script non-module
document.addEventListener('DOMContentLoaded', function() {
  var btnLogin = document.getElementById('tab-login');
  var btnSignup = document.getElementById('tab-signup');
  if(btnLogin) btnLogin.addEventListener('click', function(){ if(window.showAuthTab) window.showAuthTab('login'); });
  if(btnSignup) btnSignup.addEventListener('click', function(){ if(window.showAuthTab) window.showAuthTab('signup'); });
  // Bind autres boutons inline
  var btnConnect = document.querySelector('[onclick="doLogin()"]');
  if(btnConnect) { btnConnect.removeAttribute('onclick'); btnConnect.addEventListener('click', function(){ if(window.doLogin) window.doLogin(); }); }
  var btnSignupBtn = document.querySelector('[onclick="doSignUp()"]');
  if(btnSignupBtn) { btnSignupBtn.removeAttribute('onclick'); btnSignupBtn.addEventListener('click', function(){ if(window.doSignUp) window.doSignUp(); }); }
});
</script>
